# Workflow for Telemedicine Service
name: Build and Push Docker Image (Telemedicine Service)

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main   

jobs:
  build:
    name: Build Docker image
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract short SHA
        id: vars
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            echo "SHORT_SHA=$(echo ${{ github.event.pull_request.head.sha }} | cut -c1-7)" >> $GITHUB_ENV
          else
            echo "SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_ENV
          fi

      - name: Log in to Docker Hub
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image (no push on PR)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name == 'push' }}
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/telemedicine-service:latest,${{ secrets.DOCKERHUB_USERNAME }}/telemedicine-service:${{ env.SHORT_SHA }}
        env:
          DOCKER_BUILDKIT: 1

      - name: Checkout Infrastructure Repo
        if: github.event_name == 'push'
        uses: actions/checkout@v4
        with:
          repository: Distributed-Health-System/infrastructure
          token: ${{ secrets.INFRA_REPO_PAT }}
          path: infrastructure
          
      - name: Update Kustomize Image Tag
        if: github.event_name == 'push'
        working-directory: infrastructure/k8s/telemedicine-service
        run: |
          kustomize edit set image amzalfoumi/telemedicine-service=amzalfoumi/telemedicine-service:${{ env.SHORT_SHA }}

      - name: Commit and Push back to GitOps Repo
        if: github.event_name == 'push'
        working-directory: infrastructure
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add k8s/telemedicine-service/kustomization.yaml
          git commit -m "Deploy telemedicine-service to version ${{ env.SHORT_SHA }}"
          git pull --rebase origin main
          git push origin main
